<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WebPage using Bootstrap</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">MySite</a>
    </div>
  </nav>

  <div class="container my-4">

    
    <div class="card" style="width: 18rem;">
      <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Sample">
      <div class="card-body">
        <h5 class="card-title">Card Title</h5>
        <p class="card-text">Quick example card with image and button.</p>
        <a href="#" class="btn btn-primary">Click Me</a>
      </div>
    </div>

   
    <div class="mt-4">
      <h6>Progress</h6>
      <div class="progress">
        <div class="progress-bar" role="progressbar" style="width: 60%;" aria-valuenow="60" aria-valuemin="0" aria-valuemax="100">
          60%
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
